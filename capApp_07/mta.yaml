_schema-version: 3.3.0
ID: capApp_07
description: A simple CAP project.
version: 1.0.0
modules:
- name: capApp_07-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: capApp_07-auth
  - name: capApp_07-db
  - name: capApp_07-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: capApp_07-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: capApp_07-db
  parameters:
    buildpack: nodejs_buildpack
- name: capApp_07
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: capApp_07-auth
  - name: capApp_07-destination
  
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M
resources:
- name: capApp_07-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
        redirect-uris:
        - https://*~{app-api/app-uri}/**
        - https://api.cf.us10-001.hana.ondemand.com
      role-collections:
      - description: generated
        name: Viewer (capApp_07 ${org}-${space})
        role-template-references:
        - $XSAPPNAME.Viewer
      tenant-mode: dedicated
      xsappname: capApp_07-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api
- name: capApp_07-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: capApp_07-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm install
    - npx cds build --production
